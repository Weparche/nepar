# Nginx snippet for nepar.hr/vortex
# Add inside your nepar.hr server { } block.
# After `npm run build`, static files are in dist/vortex/

location /vortex/ {
    alias /var/www/nepar.hr/vortex/;
    try_files $uri $uri/ /vortex/index.html;
}

# Redirect /vortex -> /vortex/
location = /vortex {
    return 301 /vortex/;
}
