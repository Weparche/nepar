# Nginx snippet for nepar.hr SPA routes (e.g. /mozgalica, /kontakt).
# Add inside your nepar.hr server { } block.
# IMPORTANT: do not deploy a physical dist/mozgalica/ directory — it breaks /mozgalica.

location / {
    root /var/www/nepar.hr;
    try_files $uri $uri/ /index.html;
}

location /vortex/ {
    alias /var/www/nepar.hr/vortex/;
    try_files $uri $uri/ /vortex/index.html;
}

location = /vortex {
    return 301 /vortex/;
}

location /zoyya/ {
    alias /var/www/nepar.hr/zoyya/;
    try_files $uri $uri/ /zoyya/index.html;
}

location = /zoyya {
    return 301 /zoyya/;
}
